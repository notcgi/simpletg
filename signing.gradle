ext.simpletgAppId = {
    def v = localProperties['APP_ID'] ?: (project.hasProperty('TELEGRAM_APP_ID') ? TELEGRAM_APP_ID : '')
    return (v ?: '').toString().trim()
}()
ext.simpletgAppHash = {
