def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}

ext.simpletgStorePassword = {
    def v = keystoreProperties['RELEASE_STORE_PASSWORD'] ?: localProperties['RELEASE_STORE_PASSWORD'] ?: (project.hasProperty('RELEASE_STORE_PASSWORD') ? RELEASE_STORE_PASSWORD : '')
    if (!v) {
        throw new GradleException("Missing RELEASE_STORE_PASSWORD. Put it in keystore.properties (see keystore.properties.example).")
    }
    return v
}()
