    def v = keystoreProperties['RELEASE_KEY_PASSWORD'] ?: localProperties['RELEASE_KEY_PASSWORD'] ?: (project.hasProperty('RELEASE_KEY_PASSWORD') ? RELEASE_KEY_PASSWORD : '')
    if (!v) {
        throw new GradleException("Missing RELEASE_KEY_PASSWORD. Put it in keystore.properties (see keystore.properties.example).")
