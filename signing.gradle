    def v = keystoreProperties['RELEASE_KEY_ALIAS'] ?: localProperties['RELEASE_KEY_ALIAS'] ?: (project.hasProperty('RELEASE_KEY_ALIAS') ? RELEASE_KEY_ALIAS : '')
    if (!v) {
        throw new GradleException("Missing RELEASE_KEY_ALIAS. Put it in keystore.properties (see keystore.properties.example).")
